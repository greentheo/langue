# Langue Configuration File

###############################
# General Settings
###############################
[general]
# Default language for learning
default_language = "Spanish"
# Available themes: "default", "dark", "light", "colorful"
theme = "default"
# Automatically check for updates on startup
check_updates = true
# Save session data for analytics (local only)
save_analytics = true

###############################
# User Profile
###############################
[user]
# Your username
username = "language_learner"
# Your learning level (1-5)
# 1: Beginner, 2: Elementary, 3: Intermediate, 4: Advanced, 5: Proficient
level = 1
# Daily learning goal (in minutes)
daily_goal = 15

###############################
# Model Settings
###############################
[model]
# Primary model to use
# Options: "ollama", "claude", "openai", etc.
primary = "ollama"
# Fallback model if primary is unavailable
fallback = "claude"
# Model temperature (0.0-1.0)
# Lower values = more deterministic responses
# Higher values = more creative responses
temperature = 0.7

# Ollama-specific settings
[model.ollama]
# Server address
server = "http://localhost:11434"
# Default model to use
# Will be auto-populated with available models when first run
model = "llama3"
# Context window size
context_window = 4096

# Claude-specific settings
[model.claude]
# API key
api_key = "your_claude_api_key_here"
# Model version
model = "claude-3-haiku-20240307"
# Max tokens to generate
max_tokens = 1000

# OpenAI-specific settings
[model.openai]
# API key
api_key = "your_openai_api_key_here"
# Model version
model = "gpt-3.5-turbo"
# Max tokens to generate
max_tokens = 1000

###############################
# Activity Settings
###############################
[activities]
# Number of items per session for each activity type
[activities.flashcards]
items_per_session = 10
# Time in seconds before showing answer (0 for manual reveal)
auto_reveal = 0

[activities.fill_blank]
items_per_session = 5
# Difficulty level (1-3)
difficulty = 1

[activities.chat]
# Chat session duration in minutes
duration = 10
# Chat complexity level (1-5)
# 1: Very simple sentences, 2: Simple, 3: Moderate, 4: Advanced, 5: Native-like
complexity = 1

###############################
# Progress Tracking
###############################
[progress]
# Save progress to file
save_progress = true
# Show progress summary after each session
show_summary = true
# Remind of streak status
streak_reminder = true

###############################
# Language-Specific Settings
###############################
[languages.Spanish]
# Focus areas: "vocabulary", "grammar", "conversation", "reading", "all"
focus = "all"
# Dialect preference (if applicable)
dialect = "Spain"

[languages.French]
focus = "vocabulary"
dialect = "France"

###############################
# Advanced Settings
###############################
[advanced]
# Debug mode
debug = false
# Log level: "error", "warn", "info", "debug"
log_level = "info"
# Cache directory
cache_dir = "~/.cache/langue"
# Max cache size in MB
max_cache_size = 100
# Proxy URL (if needed)
proxy = ""

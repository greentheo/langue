# Langue configuration example.
#
# Copy to ~/.config/langue/config.toml and edit. The keys below match Langue's
# actual settings schema, so they take effect (older example files used a
# different layout that was silently ignored).
#
# API keys are NOT stored here — put them in a .env file or your environment:
#   ANTHROPIC_API_KEY=...   (for the Claude backend)
#   OPENAI_API_KEY=...      (if using OpenAI)

# --- General ---
default_language = "Spanish"
theme = "default"          # "default", "dark", "light", "colorful"
check_updates = true
save_analytics = true
prompt_for_model = true    # prompt for model selection on first run

# --- User profile ---
username = "language_learner"
level = 1                  # 1 Beginner ... 5 Proficient
daily_goal = 15            # minutes

# --- Model selection ---
primary_model = "claude"   # "ollama", "claude", or "openai"
fallback_model = "ollama"

# --- Advanced ---
debug = false
log_level = "info"         # "error", "warning", "info", "debug"
cache_dir = "~/.cache/langue"
max_cache_size = 100       # MB

# --- Local model (Ollama) ---
[ollama]
server = "http://localhost:11434"
model_name = "llama3.2"    # or any installed Ollama model
context_window = 4096
temperature = 0.7
max_tokens = 1000

# --- Claude (cloud) --- key comes from ANTHROPIC_API_KEY in your environment
[claude]
model_name = "claude-haiku-4-5"
temperature = 0.7
max_tokens = 1000

# --- OpenAI (cloud) --- key comes from OPENAI_API_KEY in your environment
[openai]
model_name = "gpt-4o-mini"
temperature = 0.7
max_tokens = 1000

# --- Activities --- items_per_session, difficulty (1-5), auto_reveal (seconds)
[activities.flashcards]
items_per_session = 10
difficulty = 1
auto_reveal = 0

[activities.fill_blank]
items_per_session = 5
difficulty = 1

[activities.chat]
items_per_session = 1
difficulty = 1

[activities.reading]
items_per_session = 3
difficulty = 1

[activities.translation]
items_per_session = 5
difficulty = 1

# --- Language-specific settings ---
[languages.Spanish]
focus = "all"              # "vocabulary", "grammar", "conversation", "reading", "all"
dialect = "Spain"
custom_vocabulary = []

[languages.French]
focus = "vocabulary"
dialect = "France"
custom_vocabulary = []
